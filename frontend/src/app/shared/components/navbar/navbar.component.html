<header class="app-header">
    <a class="logo" [routerLink]="(isAuthenticated$ | async) ? '/' : '/login'" title="Ir al inicio">
        <img src="dapper-logo.png" alt="Dapper" class="navbar-logo" />
    </a>

    <div class="actions">
        <ng-container *ngIf="isAuthenticated$ | async; else loggedOut">
            <div class="workspace-selector" *ngIf="(workspaces$ | async) as workspaces">
                <p-dropdown [options]="workspaces" [(ngModel)]="activeWorkspaceId" optionLabel="name" optionValue="_id"
                    (onChange)="onWorkspaceChange($event)" placeholder="Seleccionar Proyecto"
                    styleClass="w-full md:w-14rem" [disabled]="workspaces.length === 0">
                </p-dropdown>
            </div>

            <div class="user-profile flex align-items-center gap-3" *ngIf="auth.currentUser$ | async as user">
                <span class="hidden md:inline font-semibold">{{ user.displayName || user.email }}</span>
                <a routerLink="/profile" pTooltip="Ver mi perfil" tooltipPosition="bottom"
                    class="relative inline-block cursor-pointer">
                    <img [src]="user.photoURL || 'assets/default-avatar.png'" [alt]="user.displayName || ''"
                        class="avatar w-2rem h-2rem border-circle" />
                    <span
                        class="absolute bottom-0 right-0 w-2 h-2 bg-green-500 border border-white rounded-full"></span>
                </a>
                <p-button *ngIf="hasInviteRights" icon="pi pi-user-plus" severity="secondary" [outlined]="true"
                    size="small" pTooltip="Invitar a un Miembro" tooltipPosition="bottom"
                    (onClick)="openInviteDialog()">
                </p-button>
                <a *ngIf="isAdmin" routerLink="/admin" class="p-button p-button-sm p-button-outlined p-button-secondary"
                    pTooltip="Panel de Administración" tooltipPosition="bottom">
                    <i class="pi pi-shield"></i>
                    <span class="hidden md:inline ml-1">Admin</span>
                </a>
            </div>

            <button pButton type="button" class="p-button-text p-button-danger p-button-sm border " (click)="logout()">
                <i class="pi pi-sign-out"></i>
                <span class="hidden md:inline ml-2">Cerrar Sesión</span>
            </button>
        </ng-container>

        <ng-template #loggedOut>
            <p-button label="Iniciar Sesión" icon="pi pi-user" (onClick)="login()">
            </p-button>
        </ng-template>
    </div>
</header>

<p-dialog header="Invitar a un Miembro" [(visible)]="displayInviteDialog" [modal]="true"
    [style]="{ width: 'min(400px, 90vw)' }" [draggable]="false" [resizable]="false">
    <div class="flex flex-column py-3 gap-3">
        <div *ngIf="!generatedInviteLink">
            <p class="mb-2 mt-0 text-sm text-color-secondary">Ingresa un correo para enviar invitación, o déjalo en blanco para crear un enlace.</p>
            <input pInputText id="email" type="email" placeholder="Correo electrónico (Opcional)" [(ngModel)]="inviteEmail"
                class="w-full" />
        </div>
        
        <div *ngIf="generatedInviteLink" class="flex flex-column gap-2">
            <p class="m-0 text-sm font-medium">Enlace generado:</p>
            <p class="m-0 text-sm text-color-secondary">Copia este enlace y compártelo con el miembro que deseas invitar.</p>
            <div class="p-inputgroup w-full mt-2">
                <input type="text" pInputText [value]="generatedInviteLink" readonly class="w-full" />
                <button type="button" pButton icon="pi pi-copy" (click)="copyInviteLink()"></button>
            </div>
        </div>
    </div>
    <ng-template pTemplate="footer">
        <ng-container *ngIf="!generatedInviteLink">
            <p-button label="Cancelar" [text]="true" severity="secondary"
                (onClick)="displayInviteDialog = false"></p-button>
            <p-button [label]="inviteEmail ? 'Enviar Correo' : 'Generar Enlace'" [icon]="inviteEmail ? 'pi pi-send' : 'pi pi-link'" [loading]="isInviting" (onClick)="inviteUser()"></p-button>
        </ng-container>
        <ng-container *ngIf="generatedInviteLink">
            <p-button label="Cerrar" [text]="true" severity="secondary"
                (onClick)="displayInviteDialog = false"></p-button>
        </ng-container>
    </ng-template>
</p-dialog>
